<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meditation Journey · Journey</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-dark" data-audio-ui="true" data-audio-autostart="true">
    <main class="screen screen-burn">
      <div
        class="journey-gratitude-gradient is-hidden"
        aria-hidden="true"
        data-journey-gratitude-gradient
      ></div>
      <div class="screen-content">
        <h1 class="burn-title burn-seq burn-seq-1 breathing-title" data-burn-title>
          Write something you’d like to let go of.
        </h1>
        <h1
          class="burn-title breathing-title journey-phase-title is-hidden"
          data-breathing-phase-title
          aria-live="polite"
        ></h1>
        <section class="burn-input-stack">
          <div class="burn-input-frame burn-seq burn-seq-2" data-burn-frame>
            <textarea
              class="burn-input"
              name="burn-note"
              placeholder=""
              aria-label="Write something you’d like to let go of"
              data-burn-input
            ></textarea>
            <div class="burn-video-layer" aria-hidden="true" data-burn-video-layer>
              <video
                class="burn-video-source"
                src="/assets/CENTER_FIRE_alpha.webm"
                data-fallback-src="/assets/CENTER_FIRE_web.mp4"
                data-alpha-ios-src="/assets/CENTER_FIRE_alpha_ios.mov"
                muted
                playsinline
                preload="auto"
                data-burn-video
              ></video>
              <canvas class="burn-video-canvas" data-burn-video-canvas></canvas>
            </div>
          </div>
          <button
            class="burn-button burn-seq burn-seq-3"
            type="button"
            data-burn-button
          >
            🔥🔥🔥
          </button>
        </section>
        <section
          class="breathing-stage is-hidden"
          aria-hidden="true"
          data-journey-breathing-stage
        >
          <canvas
            class="breathing-canvas"
            data-breathing-canvas
            data-breathing-autostart="false"
          ></canvas>
        </section>
        <section
          class="body-figure-stage is-hidden"
          aria-hidden="true"
          data-journey-body-figure-stage
        >
          <object
            class="body-figure"
            data="/assets/human body and gradients.svg"
            type="image/svg+xml"
            aria-hidden="true"
            data-journey-body-figure
          ></object>
        </section>
        <section class="journey-finish is-hidden" data-journey-finish>
          <div class="finish-flow" aria-live="polite">
            <section class="finish-phase-1" data-finish-phase-1>
              <p class="intro-copy">
                <span class="intro-line intro-line-1" data-finish-intro-line-1
                  >Your journey is over.</span
                >
                <span class="intro-line intro-line-2" data-finish-intro-line-2
                  >How are you feeling?</span
                >
              </p>
            </section>

            <section class="finish-phase-2 is-hidden" data-finish-phase-2>
              <p class="finish-return-copy" data-finish-return-text>
                The door will be here when you return.
              </p>

              <div class="finish-figure-wrap" data-finish-flower-wrap>
                <img
                  class="finish-figure"
                  src=""
                  alt="A flower"
                  data-finish-flower
                />
              </div>

              <div class="finish-buttons-wrap">
                <div class="finish-buttons" data-finish-buttons>
                  <a class="finish-action" href="/">Go to the door</a>
                  <a
                    class="finish-action finish-action-coffee"
                    href="https://buymeacoffee.com/nadiavalko"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <img
                      class="finish-action-icon"
                      src="/assets/coffee cup.svg"
                      alt=""
                      aria-hidden="true"
                    />
                    <span>Buy me a coffee</span>
                  </a>
                </div>
              </div>
            </section>
          </div>
        </section>
      </div>
    </main>
    <script src="/audio.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
